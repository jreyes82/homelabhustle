<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — Homelab Hustle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<link rel="icon" type="image/svg+xml" href="logo.svg">
<style>
  .filter-row {
    display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px;
  }

  .filter-btn {
    font-family: var(--mono); font-size: 9px; letter-spacing: .14em;
    text-transform: uppercase; padding: 8px 14px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--muted); cursor: pointer; transition: all .15s;
  }

  .filter-btn:hover { border-color: var(--bord2); color: var(--text); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: var(--light); }

  .blog-grid {
    display: grid; grid-template-columns: 1fr;
    gap: 1px; background: var(--border);
  }

  .blog-card {
    background: var(--surface); padding: 24px;
    text-decoration: none; display: block;
    border-top: 3px solid transparent;
    transition: background .2s, border-top-color .2s;
  }

  .blog-card:hover { background: var(--surf2); border-top-color: var(--accent); }
  .blog-card.hidden { display: none; }

  .bc-meta {
    display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 10px;
  }

  .bc-date {
    font-family: var(--mono); font-size: 9px; letter-spacing: .15em;
    text-transform: uppercase; color: var(--faint);
  }

  .bc-tag {
    font-family: var(--mono); font-size: 9px; letter-spacing: .1em;
    text-transform: uppercase; color: var(--acc2);
    padding: 2px 7px; border: 1px solid rgba(58,126,170,.25);
  }

  .bc-title {
    font-family: var(--serif); font-size: 18px; font-weight: 700;
    color: var(--light); line-height: 1.3; margin-bottom: 8px;
  }

  .bc-excerpt {
    font-size: 13px; font-weight: 300; color: var(--muted);
    line-height: 1.7; margin-bottom: 14px;
  }

  .bc-read {
    font-family: var(--mono); font-size: 9px; letter-spacing: .12em;
    text-transform: uppercase; color: var(--accent);
  }

  .empty-state {
    padding: 48px 24px; text-align: center;
    font-size: 13px; color: var(--faint);
    background: var(--surface);
  }

  @media (min-width: 768px) {
    .blog-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<script src="config.js"></script>

<header id="topbar">
  <a href="index.html" class="topbar-logo" id="topbar-name"></a>
  <button class="hamburger" id="hamburger" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
</header>

<nav id="drawer">
  <div class="drawer-avatar" id="drawer-avatar"></div>
  <div class="drawer-name" id="drawer-name"></div>
  <div class="drawer-role" id="drawer-role"></div>
  <div class="drawer-status">
    <div class="drawer-dot"></div>
    <span id="drawer-status"></span>
  </div>
  <div class="drawer-divider"></div>
  <div class="drawer-label">Navigate</div>
  <ul class="drawer-nav">
    <li><a href="index.html">Home</a></li>
    <li><a href="index.html#projects">Projects</a></li>
    <li><a href="index.html#skills">Skills</a></li>
    <li><a href="index.html#experience">Experience</a></li>
    <li><a href="blog.html" class="active">Blog</a></li>
    <li><a href="tools.html">Tools</a></li>
    </ul>
  <div class="drawer-divider"></div>
  <div class="drawer-label">Contact</div>
  <div class="drawer-contact" id="drawer-contact"></div>
</nav>

<main id="main">
  <div class="page-eyebrow">Writing</div>
  <h1 class="page-title">Blog</h1>
  <div class="page-rule"></div>
  <div class="filter-row" id="filters"></div>
  <div class="blog-grid" id="blog-grid"></div>
</main>

<script>
  document.title = 'Blog — ' + SITE.name;
  const initials = SITE.name.split(' ').map(w=>w[0]).join('');

  document.getElementById('topbar-name').textContent = SITE.name;
  document.getElementById('drawer-avatar').innerHTML = '<img src="logo.svg" alt="Homelab Hustle" style="width:120px;height:72px;">';
  document.getElementById('drawer-name').textContent = SITE.name;
  document.getElementById('drawer-role').textContent = SITE.role;
  document.getElementById('drawer-status').textContent = SITE.status;

  document.getElementById('drawer-contact').innerHTML = SITE.contact.map(c=>`
    <a href="${c.href}" ${c.href.startsWith('http')?'target="_blank"':''}>
      <span class="drawer-contact-label">${c.label}</span>${c.value}
    </a>`).join('');

  /* filters */
  const tags = ['All', ...new Set(SITE.blog.map(b=>b.tag))];
  let active = 'All';
  const filterRow = document.getElementById('filters');
  tags.forEach(tag => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (tag==='All'?' active':'');
    btn.textContent = tag;
    btn.onclick = () => {
      active = tag;
      document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.blog-card').forEach(card=>{
        card.classList.toggle('hidden', active!=='All' && card.dataset.tag!==active);
      });
    };
    filterRow.appendChild(btn);
  });

  /* grid */
  const grid = document.getElementById('blog-grid');
  grid.innerHTML = SITE.blog.length
    ? SITE.blog.map(b=>`
        <a href="${b.href}" class="blog-card" data-tag="${b.tag}">
          <div class="bc-meta">
            <span class="bc-date">${b.date}</span>
            <span class="bc-tag">${b.tag}</span>
          </div>
          <div class="bc-title">${b.title}</div>
          <p class="bc-excerpt">${b.excerpt}</p>
          <span class="bc-read">Read post &rarr;</span>
        </a>`).join('')
    : '<div class="empty-state">No posts yet — check back soon.</div>';

  /* hamburger */
  const hamburger = document.getElementById('hamburger');
  const drawer = document.getElementById('drawer');
  hamburger.addEventListener('click', () => {
    const isOpen = drawer.classList.toggle('open');
    hamburger.classList.toggle('open', isOpen);
    document.body.style.overflow = isOpen ? 'hidden' : '';
  });
  drawer.querySelectorAll('a').forEach(link => {
    link.addEventListener('click', () => {
      drawer.classList.remove('open');
      hamburger.classList.remove('open');
      document.body.style.overflow = '';
    });
  });
</script>
</body>
</html>
