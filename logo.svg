<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 72" width="120" height="72">
  <defs>
    <style>
      .logo-serif { font-family: 'Playfair Display', Georgia, serif; }
      .logo-mono  { font-family: 'IBM Plex Mono', 'Courier New', monospace; }
    </style>
  </defs>

  <!-- Network node icon -->
  <!-- Central node -->
  <circle cx="60" cy="18" r="6" fill="#3A7EAA"/>

  <!-- Outer nodes -->
  <circle cx="40" cy="6"  r="3" fill="none" stroke="#5BA3CC" stroke-width="1.2"/>
  <circle cx="80" cy="6"  r="3" fill="none" stroke="#5BA3CC" stroke-width="1.2"/>
  <circle cx="40" cy="30" r="3" fill="none" stroke="#1E3045" stroke-width="1.2"/>
  <circle cx="80" cy="30" r="3" fill="none" stroke="#1E3045" stroke-width="1.2"/>

  <!-- Connection lines -->
  <line x1="54" y1="13" x2="43"  y2="8"  stroke="#5BA3CC" stroke-width="0.9"/>
  <line x1="66" y1="13" x2="77"  y2="8"  stroke="#5BA3CC" stroke-width="0.9"/>
  <line x1="54" y1="23" x2="43"  y2="28" stroke="#253D52" stroke-width="0.9"/>
  <line x1="66" y1="23" x2="77"  y2="28" stroke="#253D52" stroke-width="0.9"/>

  <!-- Wordmark -->
  <text
    x="60" y="50"
    class="logo-serif"
    font-size="16"
    font-weight="700"
    fill="#E8F2FA"
    text-anchor="middle"
    letter-spacing="0.3">Homelab</text>

  <text
    x="60" y="63"
    class="logo-mono"
    font-size="8"
    fill="#5BA3CC"
    text-anchor="middle"
    letter-spacing="4">HUSTLE</text>

  <!-- Accent line -->
  <rect x="30" y="67" width="60" height="0.8" fill="#1E3045"/>
</svg>
